name: ci

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, sqlite3
          coverage: none

      - name: Configure Nova
        run: |
          echo '{"http-basic":{"nova.laravel.com":{"username":"${{ secrets.NOVA_USERNAME }}","password":"${{ secrets.NOVA_PASSWORD }}"}}}' > auth.json

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan passport:keys

      - name: Test
        run: php artisan test

  e2e:
    runs-on: ubuntu-latest
    needs: backend
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, mbstring, xml, sqlite3, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Configure Nova
        run: |
          echo '{"http-basic":{"nova.laravel.com":{"username":"${{ secrets.NOVA_USERNAME }}","password":"${{ secrets.NOVA_PASSWORD }}"}}}' > auth.json

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          set -euo pipefail

          cp .env.e2e .env
          php artisan key:generate

          mkdir -p database
          touch database/e2e.sqlite

          php artisan migrate:fresh --seed --env=e2e --force
          php artisan passport:keys --env=e2e

          APP_ENV=e2e APP_URL=http://127.0.0.1:8899 php artisan serve --host=127.0.0.1 --port=8899 > /tmp/laravel-e2e.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID >/dev/null 2>&1 || true' EXIT

          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8899/ >/dev/null; then
              break
            fi
            sleep 1
          done

          if ! curl -sf http://127.0.0.1:8899/ >/dev/null; then
            echo "Laravel e2e server failed to start"
            cat /tmp/laravel-e2e.log
            exit 1
          fi

          timeout 10m env E2E_BASE_URL=http://127.0.0.1:8899 E2E_SKIP_GLOBAL_SETUP=1 npm run test:e2e || {
            status=$?
            echo "Playwright run failed (exit ${status}). Laravel server log:"
            cat /tmp/laravel-e2e.log || true
            exit ${status}
          }
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: backend/playwright-report/
          if-no-files-found: ignore
